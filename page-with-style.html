<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS3 Example</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            font-size: 16px;
            background-color: lightgray;
            margin: 0;
            padding: 0;
        }

        h1 {
            color: #333;
            text-align: center;
        }

        p {
            color: #555;
            margin: 20px;
            padding: 15px;
            background-color: white;
            border: 1px solid #ccc;
            border-radius: 8px;
        }

        /* Media query for small screens */
        @media (max-width: 600px) {
            body {
                font-size: 14px;
            }

            p {
                margin: 10px;
                padding: 10px;
            }
        }
    </style>
</head>

<body>
    <h1>Welcome to the CSS3 Course</h1>
    <p>This is an example paragraph demonstrating how CSS3 styles can be applied to HTML elements.</p>
</body>

</html>
