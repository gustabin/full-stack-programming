<!DOCTYPE html>
<html lang="en">

<head>
    <title>JS Fundamentals Example</title>
</head>

<body>
    <h2>JavaScript Fundamentals Demo</h2>
    <button id="actionBtn">Click to Run</button>
    <p id="result"></p>

    <script>
        // --- 3.1.1 Variables ---
        var legacyMessage = "I am a var (function/global scope)";
        let modernMessage = "I am a let (block scope)";
        const PI = 3.1416; // Constant

        // --- 3.1.2 Functions ---

        // 1. Function Declaration
        function greet(name) {
            return "Hello, " + name + "!";
        }

        // 2. Anonymous Function
        const despedir = function (name) {
            return "Goodbye, " + name + "!";
        };

        // 3. Arrow Function (ES6)
        const multiplicar = (a, b) => a * b;

        // --- 3.1.3 Events ---
        // 1. Select the HTML elements
        const button = document.getElementById("actionBtn");
        const output = document.getElementById("result");

        // 2. Attach an Event Listener to the button
        button.addEventListener("click", function () {
            // Execute the functions and use the variables when the event occurs
            let resultText = "";
            resultText += greet("Charles") + "<br>";
            resultText += despedir("Charles") + "<br>";
            resultText += "Multiplication (2 * 3) = " + multiplicar(2, 3) + "<br>";
            resultText += "Constant PI = " + PI;

            // Update the HTML page
            output.innerHTML = resultText;
        });
    </script>
</body>

</html>
