<!DOCTYPE html>
<html lang="en">

<head>
    <title>Consuming APIs with fetch() & Error Handling</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 600px;
            margin: 20px auto;
        }

        input,
        button {
            padding: 8px;
            margin: 5px 0;
        }

        ul {
            list-style-type: none;
            padding: 0;
        }

        li {
            padding: 10px;
            border: 1px solid #ddd;
            margin: 5px 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .btn-action {
            padding: 5px 10px;
            font-size: 0.8em;
            cursor: pointer;
            border: none;
            color: white;
        }

        .btn-edit {
            background: #ffc107;
        }

        .btn-delete {
            background: #dc3545;
        }

        /* 5.4 Styling for error and success messages */
        #error-message {
            display: none;
            color: white;
            background-color: #dc3545;
            padding: 10px;
            margin: 10px 0;
            border-radius: 4px;
        }

        #success-message {
            display: none;
            color: white;
            background-color: #28a745;
            padding: 10px;
            margin: 10px 0;
            border-radius: 4px;
        }
    </style>
</head>

<body>

    <h2>User Management API (fetch)</h2>

    <!-- 5.4 Containers for displaying errors and success messages in the UI -->
    <div id="error-message"></div>
    <div id="success-message"></div>

    <!-- Form for POST -->
    <h3>Add New User</h3>
    <input type="text" id="name" placeholder="Name">
    <input type="email" id="email" placeholder="Email">
    <button onclick="addUser()">Add User</button>

    <!-- List for GET -->
    <h3>Users List</h3>
    <button onclick="getUsers()">Refresh List</button>
    <ul id="list-users"></ul>

    <script>
        // Using a free mock API to simulate the PHP backend
        const API_URL = "https://reqres.in/api/users";

        // ==========================================
        // 5.4 Displaying errors/success in the UI
        // ==========================================
        function showError(message) {
            const errorDiv = document.getElementById("error-message");
            errorDiv.textContent = message;
            errorDiv.style.display = "block";
            setTimeout(() => { errorDiv.style.display = "none"; }, 5000);
        }

        function showSuccess(message) {
            const successDiv = document.getElementById("success-message");
            successDiv.textContent = message;
            successDiv.style.display = "block";
            setTimeout(() => { successDiv.style.display = "none"; }, 3000);
        }

        // ==========================================
        // 1️⃣ Get users (GET) & 5.4 Response handling
        // ==========================================
        function getUsers() {
            fetch(API_URL)
                .then(response => {
                    // 5.4 Handling HTTP Responses: Check if response.ok is false
                    if (!response.ok) {
                        throw new Error(`Error ${response.status}: ${response.statusText}`);
                    }
                    return response.json();
                })
                .then(data => {
                    // The mock API returns { data: [...] }, so we extract the array
                    showUsers(data.data);
                })
                .catch(error => {
                    // 5.4 Catching errors and showing them in the UI
                    showError("Could not retrieve users. " + error.message);
                });
        }

        function showUsers(users) {
            const list = document.getElementById("list-users");
            list.innerHTML = "";
            users.forEach(user => {
                const item = document.createElement("li");
                // Mapping mock API fields to match the example's user.name
                const displayName = `${user.first_name} ${user.last_name}`;
                item.innerHTML = `
                    <span>${displayName} - ${user.email}</span>
                    <span>
                        <button class="btn-action btn-edit" onclick="updateUser(${user.id})">Edit</button>
                        <button class="btn-action btn-delete" onclick="deleteUser(${user.id})">Delete</button>
                    </span>
                `;
                list.appendChild(item);
            });
        }

        // ==========================================
        // 2️⃣ Add a user (POST)
        // ==========================================
        function addUser() {
            const name = document.getElementById("name").value;
            const email = document.getElementById("email").value;

            if (!name || !email) {
                showError("Name and Email are required!");
                return;
            }

            fetch(API_URL, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ name, email })
            })
                .then(response => {
                    if (!response.ok) throw new Error(`Error ${response.status}`);
                    return response.json();
                })
                .then(data => {
                    showSuccess(`User added with ID: ${data.id}`);
                    document.getElementById("name").value = "";
                    document.getElementById("email").value = "";
                    getUsers(); // Refresh list
                })
                .catch(error => showError("Error adding user: " + error.message));
        }

        // ==========================================
        // 3️⃣ Update user (PUT)
        // ==========================================
        function updateUser(id) {
            const newName = prompt("New name:");
            const newEmail = prompt("New email:");

            if (newName && newEmail) {
                fetch(`${API_URL}/${id}`, {
                    method: "PUT",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ name: newName, email: newEmail })
                })
                    .then(response => {
                        if (!response.ok) throw new Error(`Error ${response.status}`);
                        return response.json();
                    })
                    .then(() => {
                        showSuccess("User updated successfully!");
                        getUsers();
                    })
                    .catch(error => showError("Error updating user: " + error.message));
            }
        }

        // ==========================================
        // 4️⃣ Delete user (DELETE)
        // ==========================================
        function deleteUser(id) {
            if (confirm("Are you sure you want to delete this user?")) {
                fetch(`${API_URL}/${id}`, {
                    method: "DELETE",
                    headers: { "Content-Type": "application/json" }
                })
                    .then(response => {
                        // DELETE often returns 204 No Content (empty body)
                        if (response.status === 204) return {};
                        if (!response.ok) throw new Error(`Error ${response.status}`);
                        return response.json();
                    })
                    .then(() => {
                        showSuccess("User deleted successfully!");
                        getUsers();
                    })
                    .catch(error => showError("Error deleting user: " + error.message));
            }
        }

        // Load users when the page loads
        document.addEventListener("DOMContentLoaded", getUsers);
    </script>
</body>

</html>
